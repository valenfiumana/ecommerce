spring.application.name=ecommerce-test

# H2 in-memory (tests)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT (required for JwtUtil bean)
jwt.secret=TEST_SECRET_DE_AL_MENOS_32_CARACTERES_123456
jwt.expiration=86400000

# Payments mock disabled by default in tests (unit tests cover behavior explicitly)
app.payments.mock-enabled=false
app.payments.mock-random-outcome=false
app.payments.mock-rechazo-cancela-pedido=false

